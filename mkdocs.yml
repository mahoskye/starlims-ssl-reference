site_name: SSL API Reference
hooks:
  - docs/hooks.py
site_description: Complete API reference for the STARLIMS Scripting Language (SSL)
site_url: https://mahoskye.github.io/starlims-ssl-reference/
repo_url: https://github.com/mahoskye/starlims-ssl-reference
repo_name: mahoskye/starlims-ssl-reference
docs_dir: content
site_dir: _site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/navigation.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mahoskye/starlims-ssl-reference

